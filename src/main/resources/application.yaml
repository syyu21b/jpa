spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop   # 개발용: 앱 시작 시 테이블 생성, 종료 시 삭제
      # 운영 환경: validate 또는 none 사용
    show-sql: true             # SQL 콘솔 출력 (개발용)
    properties:
      hibernate:
        format_sql: true       # SQL 포맷팅하여 출력

  # H2 콘솔 활성화 (개발용)
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080